
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <title>Chat</title>
    <script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@stomp/stompjs@7/bundles/stomp.umd.min.js"></script>
    <style>
        body { font-family: sans-serif; max-width: 600px; margin: 40px auto; padding: 0 16px; }
        #feed { border: 1px solid #ccc; height: 300px; overflow-y: auto; padding: 10px; margin-bottom: 10px; }
        .msg { margin: 4px 0; }
        .composer { display: flex; gap: 8px; }
        input[type=text] { flex: 1; padding: 8px; font-size: 1rem; }
        button { padding: 8px 16px; font-size: 1rem; cursor: pointer; }
        #status { margin-bottom: 8px; color: gray; font-size: 0.9rem; }
    </style>
</head>
<body>

<h2>Chat</h2>
<div id="status">Disconnected</div>

<div id="feed"></div>

<div class="composer">
    <input id="msgInput" type="text" placeholder="Type a message..." disabled />
    <button id="sendBtn" disabled>Send</button>
</div>

<br>
<button id="connectBtn">Connect</button>
<button id="disconnectBtn" disabled>Disconnect</button>

<script src="app.js"></script>
</body>
</html>
